# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: mic.pur.fioriapp01
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://s4dev.st.com:8021
          client: '800'
        app:
          name: ZFIORI_01
          description: My First Fiori App
          package: $tmp
          transport: ''
        exclude:
          - /test/
